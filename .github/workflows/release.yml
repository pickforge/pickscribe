name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-linux:
    name: Build Linux bundles
    # Older LTS keeps the AppImage glibc baseline broad.
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          conf_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          tag_version="${RELEASE_TAG#v}"
          if [[ "$tag_version" != "$conf_version" ]]; then
            echo "ERROR: tag $RELEASE_TAG (version $tag_version) does not match"
            echo "src-tauri/tauri.conf.json version $conf_version."
            echo "The updater manifest version would not match the bundle. Retag or"
            echo "bump tauri.conf.json before releasing."
            exit 1
          fi
          echo "Tag version $tag_version matches tauri.conf.json."

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            squashfs-tools \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate release config
        run: bun run pickforge-tauri-release validate-config

      - name: Build Tauri bundles
        env:
          NO_STRIP: "1"
          # Updater signing — set these repo secrets (handoff in the release docs).
          # With `createUpdaterArtifacts`, this signs the AppImage updater bundle.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles deb,appimage

      - name: Strip bundled libwayland from AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          shopt -s nullglob
          appimages=(target/release/bundle/appimage/*.AppImage)
          if [[ "${#appimages[@]}" -ne 1 ]]; then
            printf 'Expected exactly one AppImage, found %s:\n' "${#appimages[@]}"
            if [[ "${#appimages[@]}" -gt 0 ]]; then
              printf '  %s\n' "${appimages[@]}"
            fi
            exit 1
          fi
          bun run pickforge-tauri-release fix-appimage --appimage "${appimages[0]}"
          rm -f target/release/bundle/appimage/*.AppImage.tar.gz \
            target/release/bundle/appimage/*.AppImage.tar.gz.sig

      - name: Upload debug symbols to Sentry
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: pickforge
          SENTRY_PROJECT: pickscribe
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN:-}" ]]; then
            echo "SENTRY_AUTH_TOKEN not set; skipping"
            exit 0
          fi

          release_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          if ! {
            npx --yes @sentry/cli@2 debug-files upload --include-sources target/release &&
              npx --yes @sentry/cli@2 sourcemaps upload --release "pickscribe@${release_version}" dist
          }; then
            echo "::warning::Sentry upload failed; continuing release"
          fi

      - name: Collect Linux release assets
        run: |
          bun run pickforge-tauri-release collect-assets
          ls -la release-assets

      - name: Upload Linux workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pickscribe-linux-${{ github.run_number }}
          path: release-assets/

  build-macos:
    name: Build macOS Apple silicon bundle
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          conf_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          tag_version="${RELEASE_TAG#v}"
          if [[ "$tag_version" != "$conf_version" ]]; then
            echo "ERROR: tag $RELEASE_TAG (version $tag_version) does not match"
            echo "src-tauri/tauri.conf.json version $conf_version."
            exit 1
          fi
          echo "Tag version $tag_version matches tauri.conf.json."

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate release config
        run: bun run pickforge-tauri-release validate-config

      - name: Build Tauri app bundle
        env:
          # Tauri updater minisign key, not Apple code signing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles app

      - name: Version macOS updater artifact
        run: |
          version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          source_archive="target/release/bundle/macos/PickScribe.app.tar.gz"
          source_signature="${source_archive}.sig"
          target_archive="target/release/bundle/macos/PickScribe_${version}_aarch64.app.tar.gz"
          [[ -f "$source_archive" ]] || { echo "ERROR: missing $source_archive"; exit 1; }
          [[ -f "$source_signature" ]] || { echo "ERROR: missing $source_signature"; exit 1; }
          mv "$source_archive" "$target_archive"
          mv "$source_signature" "${target_archive}.sig"

      - name: Collect macOS release assets
        run: |
          bun run pickforge-tauri-release collect-assets
          ls -la release-assets

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pickscribe-macos-${{ github.run_number }}
          path: release-assets/

  # Flake recovery: re-run failed jobs; successful build artifacts are preserved.
  # Both platforms are required by pickforge.release.json requiredPlatforms.
  release:
    name: Create draft release
    needs: [build-linux, build-macos]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install release tooling
        run: bun install --frozen-lockfile

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          pattern: pickscribe-*-${{ github.run_number }}
          path: release-assets
          merge-multiple: true

      - name: Generate combined updater manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          bun run pickforge-tauri-release generate-latest-json \
            --assets-dir release-assets \
            --version "${RELEASE_TAG#v}" \
            --download-base-url "https://github.com/pickforge/pickscribe/releases/download/${RELEASE_TAG}" \
            --out release-assets/latest.json
          bun run pickforge-tauri-release verify-latest-json --input release-assets/latest.json
          ls -la release-assets

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_notes="$(cat <<'EOF'
          ## Platform support

          PickScribe ships Linux bundles built on Ubuntu and an unsigned Apple
          silicon macOS app. Install either platform with the curl installer;
          Arch/CachyOS users can also build from source. The macOS app is not
          Apple-signed or notarized because Pickforge has no Developer ID.
          Windows remains blocked pending native platform support.
          EOF
          )"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
            if [[ "$is_draft" != "true" ]]; then
              echo "ERROR: release $RELEASE_TAG is already published; refusing to replace its assets."
              exit 1
            fi
            echo "Draft release $RELEASE_TAG already exists; reusing it."
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --verify-tag \
              --title "PickScribe ${RELEASE_TAG}" \
              --notes "$release_notes" \
              --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
