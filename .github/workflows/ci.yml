name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: git --no-banner --redact

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Test OSV severity gate
        run: node tests/check-osv-severity.mjs

      - name: Scan lockfiles with OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format=json
            --output-file=osv-results.json
            ./

      - name: Block high and critical advisories
        run: node scripts/check-osv-severity.mjs osv-results.json Cargo.lock bun.lock

  check:
    name: Check and build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Svelte type check
        run: bun run check

      - name: Frontend lint
        run: bun run lint

      - name: Frontend tests
        run: bun run test

      - name: Frontend coverage
        run: bun run test:coverage

      - name: Build frontend
        run: bun run build

      - name: Rust tests
        run: cargo test --workspace --locked --all-targets

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --locked --all-targets --fail-under-lines 44 --lcov --output-path target/llvm-cov/lcov.info
          cargo llvm-cov report --html
          cargo llvm-cov report --text --output-path target/llvm-cov/summary.txt

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: warn

      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: |
            target/llvm-cov/html/
            target/llvm-cov/lcov.info
            target/llvm-cov/summary.txt
          if-no-files-found: warn

      - name: Write coverage summary
        if: always()
        shell: bash
        run: |
          summarize_lcov() {
            local file="$1"
            if [[ ! -f "$file" ]]; then
              echo "not generated"
              return
            fi
            awk '
              /^LF:/ { lines += substr($0, 4) }
              /^LH:/ { hit += substr($0, 4) }
              END {
                if (lines > 0) {
                  printf "%.2f%% (%d/%d)", hit * 100 / lines, hit, lines
                } else {
                  printf "no line data"
                }
              }
            ' "$file"
          }

          {
            echo "## Coverage"
            echo "- Frontend lines: $(summarize_lcov coverage/lcov.info)"
            echo "- Rust lines: $(summarize_lcov target/llvm-cov/lcov.info)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rust check (workspace)
        run: cargo check --workspace --all-targets

      - name: Rust check (production app features)
        run: cargo check -p pickscribe-app --features pickscribe-app/custom-protocol
